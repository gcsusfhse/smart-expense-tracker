name: smart_expense_tracker
description: "A Smart Expense Tracker mobile app built with Flutter — academic internship project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # Local database for storing expenses & budget
  sqflite: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.3

  # Local key-value storage (demo login session, theme preference)
  shared_preferences: ^2.2.3

  # Unique IDs for expense records
  uuid: ^4.4.0

  # Charts for category & monthly trend visualization
  fl_chart: ^0.68.0

  # Date and currency formatting
  intl: ^0.19.0

  # Local notifications for budget limit alerts
  flutter_local_notifications: ^17.2.1+2

  # PDF & CSV report generation
  pdf: ^3.11.0
  csv: ^6.0.0

  # Sharing exported report files
  share_plus: ^10.0.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
